<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParlaySmart v2026.X</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>PARLAYSMART v2026.X</h1>
      <p class="subtitle">FastAPI + Montecarlo Vectorizado</p>
    </header>

    <div class="search-box">
      <input type="text" id="teamInput" placeholder="ej: Barcelona vs Real Madrid" class="input-field">
      <button onclick="analyzeMatch()" class="btn-analyze">ANALIZAR →</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Analizando con 50,000 simulaciones Montecarlo...</p>
    </div>

    <div id="results" class="results hidden">
      <div class="match-info">
        <h2 id="matchTitle"></h2>
        <div class="probabilities">
          <div class="prob-item">
            <span id="probTeamA"></span>
            <span id="probTeamAVal" class="prob-value"></span>
          </div>
          <div class="prob-item">
            <span>Empate</span>
            <span id="probDrawVal" class="prob-value"></span>
          </div>
          <div class="prob-item">
            <span id="probTeamB"></span>
            <span id="probTeamBVal" class="prob-value"></span>
          </div>
        </div>
      </div>

      <div class="parlays-section">
        <h3>4 PARLAYS OPTIMIZADOS</h3>

        <div class="parlay-card ultra-conservador">
          <div class="parlay-header">🟢 ULTRA CONSERVADOR</div>
          <div id="parlay-ultra" class="parlay-content"></div>
        </div>

        <div class="parlay-card conservador">
          <div class="parlay-header">🔵 CONSERVADOR</div>
          <div id="parlay-conservador" class="parlay-content"></div>
        </div>

        <div class="parlay-card balanceado">
          <div class="parlay-header">🟡 BALANCEADO</div>
          <div id="parlay-balanceado" class="parlay-content"></div>
        </div>

        <div class="parlay-card riesgoso">
          <div class="parlay-header">🔴 RIESGOSO</div>
          <div id="parlay-riesgoso" class="parlay-content"></div>
        </div>
      </div>

      <button onclick="reset()" class="btn-back">← Nueva consulta</button>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
